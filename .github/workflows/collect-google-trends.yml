# =============================================================================
# Google Trends Data Collection Workflow
# =============================================================================
# Collects Google Trends data for 21 tracked diseases and upserts it into
# Supabase tables `google_trends` and `google_trends_regions`.
#
# Schedule: Every Monday at 06:00 UTC.
#   - Reduced from every-3-days to weekly because the script now requests a
#     3-month timeframe, so a single missed run causes zero data gap.
#   - Weekly cadence keeps total request volume to Google low, reducing
#     rate-limit exposure.
#
# Manual trigger: workflow_dispatch — use to force a backfill.
#
# Required Secrets:
#   - SUPABASE_URL          Your Supabase project URL
#   - SUPABASE_SERVICE_ROLE Service role key (not anon key)
#
# Note on disabling: GitHub auto-disables scheduled workflows after 60 days
# without activity on the default branch. To prevent this, merge to `main`
# regularly. The workflow may also be re-enabled by hand in the Actions UI.
# =============================================================================

name: Collect Google Trends Data

on:
  # Weekly, Monday 06:00 UTC
  schedule:
    - cron: "0 6 * * 1"

  # Manual trigger from the Actions UI
  workflow_dispatch:

jobs:
  collect-trends:
    name: Collect Trends Data
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      
      - name: Run Google Trends collection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: python scripts/collect_google_trends.py
      
      - name: Report status
        if: always()
        run: |
          echo "Collection job completed with status: ${{ job.status }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

